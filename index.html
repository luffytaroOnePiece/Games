<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="A personal gaming tracker — tracking playthroughs, screenshots and progress across my favorite games." />
  <title>GameVault · My Gaming Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- Animated Background -->
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <div class="page-wrapper">
    <!-- Navigation -->
    <nav class="nav" role="navigation" aria-label="Main navigation">
      <div class="container nav-inner">
        <a href="index.html" class="nav-logo" aria-label="GameVault Home">
          <div class="nav-logo-icon" aria-hidden="true">🎮</div>
          <div class="nav-logo-wordmark">
            <span class="nav-logo-text">Game<span>Vault</span></span>
            <span class="nav-logo-tagline">Personal Tracker</span>
          </div>
        </a>

        <div class="nav-center">
          <div class="nav-search-wrap">
            <span class="nav-search-icon" aria-hidden="true">🔍</span>
            <input
              type="text"
              class="nav-search"
              id="nav-search"
              placeholder="Search games…"
              aria-label="Search games"
              autocomplete="off"
              spellcheck="false"
            />
          </div>
        </div>

        <div class="nav-right">
          <div class="nav-stat" id="nav-playing-count" title="Currently playing">
            <span class="dot" aria-hidden="true"></span>
            <span id="playing-label">— Playing</span>
          </div>
          <a href="https://github.com/luffytaroOnePiece" target="_blank" rel="noopener" class="nav-github" aria-label="GitHub profile" title="GitHub">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
          </a>
        </div>
      </div>
    </nav>

    <main>
      <!-- Hero -->
      <section class="hero container" aria-label="Page header">
        <div class="hero-eyebrow">
          <span class="hero-dot" aria-hidden="true"></span>
          <span class="hero-eyebrow-text">Personal Collection</span>
          <span class="hero-divider" aria-hidden="true"></span>
          <span class="hero-eyebrow-sub" id="hero-game-count">Loading…</span>
        </div>

        <div class="hero-title-wrap">
          <div class="hero-title-glow" aria-hidden="true"></div>
          <h1 class="hero-title">My <em>Gaming</em> Vault</h1>
        </div>

        <p class="hero-subtitle">
          Tracking every adventure, chapter &amp; screenshot from the games I love.
        </p>

        <!-- Stats Bar -->
        <div class="stats-bar" id="stats-bar" role="region" aria-label="Collection statistics">
          <div class="stat-item">
            <div class="stat-icon" aria-hidden="true">🎮</div>
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-item stat-playing">
            <div class="stat-icon" aria-hidden="true">▶</div>
            <div class="stat-value" id="stat-playing">0</div>
            <div class="stat-label">Playing</div>
          </div>
          <div class="stat-item stat-completed">
            <div class="stat-icon" aria-hidden="true">✓</div>
            <div class="stat-value" id="stat-completed">0</div>
            <div class="stat-label">Completed</div>
          </div>
          <div class="stat-item stat-wishlist">
            <div class="stat-icon" aria-hidden="true">★</div>
            <div class="stat-value" id="stat-wishlist">0</div>
            <div class="stat-label">Wishlist</div>
          </div>
        </div>
      </section>

      <!-- Games Section -->
      <section class="container" aria-label="Game library">
        <div class="section-header">
          <h2 class="section-title">Library</h2>
          <span class="section-count" id="section-count">— games</span>
        </div>

        <!-- Filter Tabs -->
        <div class="filter-tabs" role="tablist" aria-label="Filter games by status">
          <button class="filter-tab active" role="tab" aria-selected="true"  data-filter="all"       id="tab-all">All</button>
          <button class="filter-tab"        role="tab" aria-selected="false" data-filter="playing"   id="tab-playing">Playing</button>
          <button class="filter-tab"        role="tab" aria-selected="false" data-filter="completed" id="tab-completed">Completed</button>
          <button class="filter-tab"        role="tab" aria-selected="false" data-filter="wishlist"  id="tab-wishlist">Wishlist</button>
          <button class="filter-tab"        role="tab" aria-selected="false" data-filter="paused"    id="tab-paused">Paused</button>
        </div>

        <!-- Cards -->
        <div class="games-grid" id="games-grid" role="list" aria-label="Game cards">
          <!-- Rendered by app.js -->
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer container">
      <p>Built with ❤️ · <a href="https://github.com/luffytaroOnePiece" target="_blank" rel="noopener">luffytaroOnePiece</a> · Deployed on GitHub Pages</p>
    </footer>
  </div>

  <!-- Scripts -->
  <script src="data/games.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
